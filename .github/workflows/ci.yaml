name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # buf-action runs lint on every event and breaking against the PR
      # base using the workflow token (works for private repos, unlike a
      # raw anonymous https git input).
      - uses: bufbuild/buf-action@v1
        with:
          lint: true
          format: false
          breaking: ${{ github.event_name == 'pull_request' }}
          push: false
          archive: false

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...

  test-redis:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race -tags redistest ./redislimiter/...
        env:
          REDIS_ADDR: localhost:6379

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # v8 ships golangci-lint v2, built with a Go new enough for this
      # module's go directive (v6's golangci-lint v1 rejects go 1.25).
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
