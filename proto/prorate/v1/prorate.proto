syntax = "proto3";

package prorate.v1;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/cadenya/prorate/gen/prorate/v1;proratev1";

extend google.protobuf.MethodOptions {
  // Per-method rate limit policy. Takes precedence over the service-level
  // default_tier.
  MethodPolicy method_policy = 51000;
}

extend google.protobuf.ServiceOptions {
  // Service-wide rate limit defaults, applied to methods that do not set
  // their own MethodPolicy.
  ServicePolicy service_policy = 51000;
}

// MethodPolicy configures rate limiting for a single RPC method.
message MethodPolicy {
  // Named tier, resolved against the rate table configured on the
  // interceptor. Unknown names fail at startup.
  string tier = 1;

  // Exempt this method entirely (health checks, etc.). Wins over any tier
  // configured here or at the service level.
  bool exempt = 2;
}

// ServicePolicy configures rate limit defaults for all methods of a service.
message ServicePolicy {
  // Default tier for all methods in this service that do not set their own
  // MethodPolicy.
  string default_tier = 1;
}
